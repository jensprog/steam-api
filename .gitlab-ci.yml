stages:
  - lint
  - test
  - build

code-quality:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install -r requirements.txt
    - echo "Running code formatting check..."
    - black --check app/
    - echo "Running linting..."
    - flake8 app/ --max-line-length=120 --extend-ignore=E203,W503
  allow_failure: false

api-tests:
  stage: test
  image: node:18-alpine
  services:
    - postgres:latest
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    DATABASE_URL: "postgresql://testuser:testpass@postgres:5432/testdb"
    JWT_SECRET: "test-secret-key-for-ci"
  script:
    - apk add --no-cache python3 py3-pip
    - pip3 install -r requirements.txt --break-system-packages
    - npm install -g newman
    - export PYTHONPATH="$CI_PROJECT_DIR:$PYTHONPATH"
    - python3 app/seed/mock_data.py
    - python3 -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
    - sleep 10
    - newman run SteamAPI.postman_collection.json --environment localhost.postman_environment.json

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE .
    - docker push $CI_REGISTRY_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"